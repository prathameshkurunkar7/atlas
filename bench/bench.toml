# Golden bench image config (spec/08-images.md § golden bench image). build.sh
# drops this over bench-cli's generated bench.toml so the baked image pins the
# Frappe branch, the MariaDB credentials, and the production process manager —
# not bench-cli's moving template. After `bench init`, build.sh installs ERPNext,
# bakes a site under the fixed name `site.local`, runs `bench setup production`,
# and leaves the stack RUNNING so a snapshot-booted clone serves immediately.
# deploy-site.py renames the baked site to the per-VM FQDN at deploy time.
#
# Schema tracks the current bench-cli (pinned in build.sh). Notable points vs the
# bench-cli README defaults:
#   * [redis] takes cache_port + queue_port ONLY — there is no socketio_port here
#     (socket.io's port is [bench].socketio_port, default 9000) and no single
#     `port`. An old `socketio_port` under [redis] is silently ignored.
#   * Workers are an array-of-tables ([[workers]] with queues + count), NOT a
#     [workers] table. The legacy `default/short/long` table form is silently
#     ignored (you'd get one default group), so it is spelled out below.
#   * ZFS is OPT-IN now (the optional-zfs merge): `bench init` sets up a pool only
#     when [volume].enabled is true. We ENABLE it (operator preference) on a file
#     vdev — the single-disk build VM has no spare block device. See [volume] below
#     and build.sh's §1 DKMS module build + §7 boot ordering.
#
# MariaDB root_password: baked, fixed, and SHARED across every VM from this
# image — and that is correct here. Each VM is single-tenant: its MariaDB binds
# localhost only (no public port; the south hop reaches Frappe's :80, not 3306),
# so the db secret never crosses a VM boundary. bench-cli sets this password on a
# fresh install itself (ALTER USER … IDENTIFIED BY) and creates the site over the
# unix socket, so build.sh no longer touches MariaDB auth. The per-SITE secret
# that DOES vary — the Frappe Administrator password — is baked as a shared
# throwaway too and rotated by the owner after first login (spec/14-self-serve.md);
# it is not reset per VM (that cost a CPU-throttled `bench frappe` boot).

[bench]
name = "atlas"
python = "3.14"

[[apps]]
name = "frappe"
repo = "https://github.com/frappe/frappe"
branch = "version-16"

[mariadb]
host = "localhost"
port = 3306
root_password = "atlas"

# Redis: bench-cli's current schema reads cache_port + queue_port only (the
# socket.io port is [bench].socketio_port, default 9000 — not a Redis key). Kept
# off the default 6379 so nothing collides with a stray system Redis.
[redis]
cache_port = 13000
queue_port = 11000

# Workers are an array-of-tables: one [[workers]] block per group, each with its
# queues + a process count. (The old `[workers]` table with default/short/long was
# dropped in bench-cli — that form is now silently ignored, yielding a single
# default group.) Two web/default workers, one dedicated to the long queue.
[[workers]]
queues = ["default", "short", "long"]
count = 2

[[workers]]
queues = ["long"]
count = 1

# Production serving: bench-cli's OWN nginx fronts every site by Host header on
# :80 (the port the EDGE proxy's south hop dials — spec/12-proxy.md), and a
# supervisor-managed process group runs gunicorn/socketio/workers.
#
# `[production].nginx = true` makes `bench init` ALSO run the production bring-up
# (process manager + nginx config), so the golden carries it from the start;
# build.sh re-runs `bench setup production` after the site exists so the site
# vhost is generated. process_manager = "supervisor" is load-bearing:
# deploy-site.py and warm.sh drive the running stack with `supervisorctl`. TLS
# terminates at the edge proxy, NOT here — letsencrypt.email is left unset so
# `setup production` never attempts certbot (spec/14-self-serve.md).
[production]
process_manager = "supervisor"
nginx = true

[nginx]
http_port = 80
https_port = 443

# ZFS is OPT-IN in the current bench-cli (the optional-zfs merge): `bench init`
# sets up a pool only when [volume].enabled is true (init.py gates on `is_linux()
# and volume.enabled`). We ENABLE it. The build VM is a single-disk droplet with
# no spare block device, so the pool is a preallocated FILE vdev on the root
# filesystem (`backing = "image"`) at /var/lib/bench-zfs/bench-pool.img — NOT a
# dedicated disk and NOT "auto" (auto sizes the image at 75% of free space and
# overwrites the quotas below). At init the benches dataset mounts at
# /root/bench-cli/benches and the mariadb dataset at /var/lib/mysql, so BOTH the
# bench code and the MariaDB data live on ZFS — build.sh orders MariaDB + the
# bench supervisord After= the zfs mount at boot. The Firecracker vmlinux ships no
# ZFS module, so build.sh §1 DKMS-builds zfs.ko against the running kernel first.
#
# Sizing is deliberately conservative for the 12 GB build disk: a 7 GB image
# leaves the root FS headroom for the OS + apt cache. The split is weighted toward
# `benches`, which holds the heavy payload — frappe + erpnext + node_modules + the
# baked site (~3.5-4.5 GB) — so it gets a 6 GB quota; the `mariadb` dataset holds
# only one baked ERPNext schema (a few hundred MB), so 1 GB is ample. Each quota
# fits inside the 7 GB pool individually (the validator checks them against the
# backing one at a time, not summed), with small reservations under each quota.
[volume]
enabled = true
pool = "bench-pool"
backing = "image"

[volume.image]
size = "7G"

[volume.benches]
quota = "6G"
reservation = "512M"

[volume.mariadb]
quota = "1G"
reservation = "256M"

[admin]
port = 8002
enabled = false
password = "atlas-admin"
