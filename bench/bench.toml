# Golden bench image config (spec/08-images.md § golden bench image). build.sh
# drops this over bench-cli's generated bench.toml so the baked image pins the
# Frappe branch and the production shape — not bench-cli's moving template.
#
# This is the PROVEN config (llm/references/bench-setup.md) with the Atlas pins.
# The whole production stack — MariaDB, Redis, nginx, supervisor-equivalent — is
# stood up and MANAGED by `bench init` + `bench start` because
# `process_manager = "systemd"`: bench-cli installs `systemctl --user` units,
# `loginctl enable-linger`s the bench user, and enables the bench target, so a
# snapshot-booted clone comes back up serving with NO hand-rolled boot unit.
# That is why build.sh is now ~the proven recipe and nothing more.
#
# MariaDB is a DEDICATED per-bench instance (`instance = "atlas"`): bench-cli
# provisions `mariadb@atlas` with its own socket + datadir and `systemctl enable
# --now`s it, so it auto-starts at boot as an ordinary system service. We never
# touch MariaDB auth ourselves — bench-cli secures it (ALTER USER over the
# instance socket). The root password is baked, fixed, and SHARED across every VM
# from this image, which is correct: each VM is single-tenant and MariaDB binds
# 127.0.0.1 only (the south hop reaches Frappe's :80, never 3306), so the secret
# never crosses a VM boundary.

[bench]
name = "atlas"
python = "3.14"
http_port = 8000
socketio_port = 9000
socketio_backend = "node"

[[apps]]
name = "frappe"
repo = "https://github.com/frappe/frappe"
branch = "version-16"

# Dedicated MariaDB instance — bench-cli runs + manages `mariadb@atlas` (its own
# socket, datadir, and enabled-at-boot systemd service). We don't configure or
# worry about MariaDB at all.
[mariadb]
host = "localhost"
port = 3306
root_password = "mariadb-root"
admin_user = "root"
socket_path = "/run/mysqld/mysqld-atlas.sock"
instance = "atlas"
data_dir = "/var/lib/mysql-atlas"

# Redis: bench-cli's schema reads cache_port + queue_port only (the socket.io
# port is [bench].socketio_port). Kept off the default 6379 so nothing collides
# with a stray system Redis.
[redis]
cache_port = 13000
queue_port = 11000

# A single worker group. Under process_manager = "systemd" bench-cli runs ONE
# `worker-pool --queue default,short,long` process (no per-queue program names),
# so the multi-queue block is fine here — the comma-in-program-name problem that
# needs one-queue-per-block is supervisor-only.
[[workers]]
queues = ["default", "short", "long"]
count = 1

# Production serving managed by systemd. `[production].nginx = true` makes
# `bench init` ALSO run the production bring-up (process manager + nginx +
# dns_multitenant); `process_manager = "systemd"` makes that bring-up a set of
# lingering `systemctl --user` units that survive reboot — the source of the
# golden's "boots serving" property. TLS terminates at the edge proxy, so
# [letsencrypt].email is left unset and certbot is never attempted.
[production]
process_manager = "systemd"
nginx = true
use_companion_manager = false

[nginx]
http_port = 80
https_port = 443
config_dir = "/etc/nginx/conf.d"
worker_processes = "auto"
client_max_body_size = "50m"

[gunicorn]
workers = 1
threads = 4
timeout = 120
worker_class = "sync"
malloc_arena_max = 2
max_requests = 0
max_requests_jitter = 0

[letsencrypt]
email = ""
webroot_path = "/var/www/letsencrypt"

# The admin app (bench-cli's management console). Under systemd it is a
# socket-activated gunicorn on 127.0.0.1:(port+1). When [admin].domain is set,
# `bench setup nginx` emits an `_admin.conf` vhost (`server_name <domain>`)
# proxying to it — that is how MODE 1 ("domain maps to the admin URL") works.
# build.sh bakes a placeholder `domain` (current bench-cli rejects an empty
# `admin.domain` during production setup); deploy-site.py rewrites it to the FQDN
# per clone in admin mode. The placeholder is never served — in site mode the FQDN
# maps to the baked site, not the admin app. The `password` below is a placeholder
# build.sh replaces with a long random secret at bake time (never surfaced) — the
# tenant handoff is `bench generate-admin-session`'s one-click URL
# (bench/deploy-site.py), not this password.
[admin]
port = 8002
timeout = 180
enabled = true
password = "admin-password"
domain = "admin.localhost"

# ZFS volume: bench code + MariaDB datadir on ZFS datasets, on a preallocated
# file vdev (the build VM is a single disk with no spare block device). `bench
# init` creates the pool + datasets and mounts them; the only ZFS thing build.sh
# does itself is DKMS-build zfs.ko (the Firecracker vmlinux ships no ZFS module)
# — everything else is bench-cli's job.
#
# No `enabled` key: at the pinned bench-cli, `_parse_volume` defaults `enabled` to
# TRUE when a [volume] table is present (bench_config.py), so the table's mere
# presence turns ZFS on — exactly as bench-setup.md relies on. (Cold-boot ZFS
# auto-import/mount-ordering is NOT wired here yet — to be verified on a host.)
[volume]
pool = "bench-pool"
backing = "image"

# Keep our PINNED size (15G). bench-cli auto-sizes the image from the host's free
# disk when it generates a bench.toml (the manual-session droplet had lots of free
# space, so it chose 55G) — but our build VM disk budget is fixed, so we pin 15G
# and do NOT adopt the session's auto-chosen value.
[volume.image]
size = "15G"
path = "/var/lib/bench-zfs/bench-pool.img"

# Single dataset (current bench-cli schema) — replaces the old split
# [volume.benches] / [volume.mariadb] tables. bench code + MariaDB datadir live on
# datasets under this one reservation/quota.
[volume.dataset]
reservation = "1G"
quota = "9G"
