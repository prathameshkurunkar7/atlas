# Atlas reverse proxy — static config (proxy-design.md §5).
#
# Paths mirror the stock Ubuntu/Debian `nginx` package: this file is /etc/nginx/
# nginx.conf, logs are /var/log/nginx, the pid is /run/nginx.pid — so an engineer
# debugging the guest finds everything where apt would put it. It never changes
# per-subdomain: the subdomain -> site-address map lives in a lua_shared_dict
# (router.lua reads it, admin.lua writes it), so a mapping change is a single
# atomic memory write with ZERO reload. The only things that change here are
# deliberate stack/config updates rolled as a new proxy snapshot.
#
# The region wildcard (e.g. blr1) is read once at init from
# /var/lib/nginx/region (written when the proxy VM is configured). The cert/key
# are region-scoped on disk (certs/<region>/, pushed by Atlas) but read here
# through a flat certs/{fullchain,privkey}.pem symlink that points into the
# active region's dir — nginx's static ssl_certificate can't interpolate the
# region, so build_proxy repoints the symlink when it writes the region.

# Workers drop to the package's stock locked/nologin `nginx` system account (the
# nginx.org .deb creates it). The MASTER stays root so it can bind :80/:443 and the
# 10000-19999 stream pool and open the log/socket fds; only the WORKERS — the code
# that parses untrusted internet bytes (TLS/HTTP), runs our routing Lua, and L4
# forwards raw tenant TCP — give up root, shrinking blast radius (CIS 2.2.1, the
# headline gap). Worker-writable runtime state (map.json / stream-map.json under
# /var/lib/nginx) is group-owned root:nginx in build.sh §7; the wildcard privkey
# stays root-only 0600 because it is read by the MASTER at config parse, never by a
# worker (CIS 4.1.3). NOTE: the privilege drop is exercised only at RUNTIME, not by
# `nginx -t` — a broken /var/lib/nginx mode passes -t and fails silently at the
# first worker map dump, so this needs the compose gate + a host bake to ship.
user  nginx;
worker_processes  auto;
pid  /run/nginx.pid;

# Dynamic modules. The base nginx is the stock nginx.org apt binary; these .so's
# are compiled separately against the matching nginx source (build.sh §4,
# --add-dynamic-module --with-compat) and dropped in /etc/nginx/modules. Unlike a
# baked-in --add-module, a dynamic module is NOT present until load_module names
# it, and these MUST precede events{}/http{}/stream{}. (NDK has no runtime .so of
# its own — it is linked into the lua modules.) ngx_stream_lua is the L4 sibling
# of ngx_http_lua (spec/17-tcp-proxy.md): without it the stream{} block's
# *_by_lua* directives are "unknown directive" and nginx -t fails.
load_module modules/ndk_http_module.so;
load_module modules/ngx_http_lua_module.so;
load_module modules/ngx_stream_lua_module.so;
load_module modules/ngx_http_headers_more_filter_module.so;

events {
    # worker_connections caps ALL connections a worker tracks — and nginx counts
    # each LISTENING socket against it too, not just live client connections. The
    # TCP forwarder pre-opens the whole 10000-19999 pool on BOTH v4 and v6 (~20000
    # listen sockets) plus the http :80/:443 + the two admin sockets, so this must
    # clear ~20006 listeners with room to spare for actual traffic, or nginx -t
    # fails "worker_connections are not enough for N listening sockets"
    # (spec/17-tcp-proxy.md — the compose gate caught the spec's earlier wrong
    # claim that listeners don't count). 65536 leaves ~45k for live connections.
    worker_connections  65536;
}

http {
    # Stock nginx.org mime.types (the package conffile) — we ship no custom map.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # We deliberately do NOT `include /etc/nginx/conf.d/*.conf`: the package's
    # conf.d/default.conf is left in place (not deleted — that would desync dpkg)
    # but never loaded. Our server_name _ default_server below owns :80/:443. If
    # this include is ever added back, the package default server would shadow ours
    # — test_build.py guards against that.

    access_log  /var/log/nginx/access.log;
    # notice level (not the default `error`): captures upstream-connect failures and
    # rejected/oversized requests for the multi-tenant front door's forensic trail,
    # without `info`'s per-connection volume under load (CIS 3.3).
    error_log   /var/log/nginx/error.log notice;

    sendfile        on;
    tcp_nopush      on;
    server_tokens   off;

    # --- DoS-resilience: slow-read / slowloris caps (CIS 5.2.1/2.4.3/2.4.4) ---
    # nginx defaults these client-side timeouts to 60s — far too generous for a
    # public TLS terminator: a slow client that dribbles header/body bytes pins a
    # worker connection for a full minute. With proxy_buffering off on `location /`
    # a slow client also pins the UPSTREAM tenant connection, so the cap protects
    # tenant VMs too, not just us. 15s is ample for a real internet client. These
    # are the CLIENT-side read/send timeouts; the location blocks' proxy_read_timeout
    # (600s / 3600s) is the SEPARATE upstream timeout and is untouched — /socket.io
    # long-poll still gets its 3600s.
    client_header_timeout  15s;
    client_body_timeout    15s;
    send_timeout           15s;
    keepalive_timeout      10;        # was 65; CIS ceiling 10s, a proxy gains little from long client keepalives

    # Cap request body size (CIS 5.2.2). nginx's implicit default is 1m — SMALLER
    # than what the tenant Frappe backend itself accepts (the bench's own nginx sets
    # client_max_body_size 50m, bench.toml [nginx]), so the 1m default would silently
    # 413 legitimate Frappe uploads before they reach the backend. Match the backend's
    # 50m so the proxy is never the tighter limit, while still bounding a body flood.
    client_max_body_size   50m;

    # lua-resty-core is mandatory (nginx refuses to start without it); make the
    # pure-Lua resty libs and our own modules resolvable. resty-core + lrucache
    # install to /usr/local/share/lua/5.1; our lua/ is /etc/nginx/lua.
    lua_package_path  "/usr/local/share/lua/5.1/?.lua;/etc/nginx/lua/?.lua;;";

    # cjson.so (build.sh §5b) installs to /usr/local/lib/lua/5.1. With the apt
    # nginx + a dynamic lua module, the default cpath is not guaranteed to include
    # it, so name it explicitly — admin.lua/persist.lua require("cjson.safe") at
    # init_by_lua and nginx crashes if it can't resolve. The compose gate asserts
    # cjson.safe loads.
    lua_package_cpath "/usr/local/lib/lua/5.1/?.so;;";

    # The authoritative in-process map: subdomain -> site address. 64m holds
    # ~250k+ entries; 10k writes/day is nothing for a shared dict.
    lua_shared_dict  sites  64m;

    # Cross-worker metadata (e.g. last-dump epoch for GET /healthz). Kept out of
    # `sites` so it never pollutes get_keys/serialize. Shared so any worker's
    # /healthz reports the dump any worker made.
    lua_shared_dict  meta  12k;

    # Init: load the region and repopulate the dict from the on-disk snapshot
    # (map.json) so a fresh worker comes up already routing. The file is read
    # ONLY here, at start; Atlas's reconcile is the durable source of truth.
    init_by_lua_block {
        local persist = require("persist")
        local f = io.open("/var/lib/nginx/region", "r")
        if f then
            atlas_region = (f:read("*l") or ""):gsub("%s+", "")
            f:close()
        else
            atlas_region = ""
        end
    }
    init_worker_by_lua_block {
        require("persist").load()
    }

    # --- TLS (A+ per 2026 Mozilla Intermediate; DHE dropped, OCSP retired) ---
    # No ssl_stapling, on purpose (CIS 4.1.7 is N/A here): Let's Encrypt shut down
    # its OCSP responders in 2025, so the wildcard certs carry no OCSP URL and
    # `ssl_stapling on` would be an inert no-op. Revocation rides short-lived certs
    # + CRLite instead — don't "fix" this by adding stapling.
    # Flat symlinks into the active region's certs/<region>/ dir (see header).
    ssl_certificate      /var/lib/nginx/certs/fullchain.pem;
    ssl_certificate_key  /var/lib/nginx/certs/privkey.pem;

    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_ciphers  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_ecdh_curve  X25519:prime256v1:secp384r1;

    ssl_session_timeout  1d;
    ssl_session_cache    shared:MozSSL:10m;
    ssl_session_tickets  off;

    # --- North side: :80 redirect-only (+ optional ACME passthrough) ---
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Only here if a node ever does HTTP-01 for a non-wildcard cert; the
        # regional wildcard is DNS-01, so this is a harmless passthrough.
        location ^~ /.well-known/acme-challenge/ {
            root /var/lib/nginx/acme;
        }
        location / {
            return 308 https://$host$request_uri;
        }
    }

    # --- North side: one :443 server block for ALL subdomains ---
    # v4 listener binds the guest's private addr; the world reaches it on the
    # attached reserved IP via host 1:1 NAT (proxy-design.md §2.2) — nginx is
    # unaware of the translation. v6 listener is the guest's public /128.
    server {
        listen      443 ssl default_server;
        listen      [::]:443 ssl default_server;
        http2  on;
        server_name _;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Strip the backend's identity headers so every tenant's gunicorn/werkzeug
        # stack + version doesn't leak to internet clients (CIS 2.5.4). server_tokens
        # off only governs nginx's OWN Server header — nginx still re-adds a bare
        # `Server: nginx` after this hides the upstream one. Set at server scope so
        # both proxy locations inherit it (neither defines its own proxy_hide_header).
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;

        set $vm_upstream "";

        # router.lua runs ONLY in the two proxy locations below (not server-wide),
        # so its miss path can render the branded page without ever re-entering
        # the router — no redirect cycle. On a miss it serves the branded
        # not_found.html itself with status 404 (unknown) / 503 (tombstoned).
        # (A stock error_page 404/503 wiring would also work; Lua owns the page so
        # the body stays cached and shares the ngx.exit idiom with admin.lua.)

        # SocketIO — websocket upgrade, long-lived.
        location /socket.io {
            access_by_lua_file /etc/nginx/lua/router.lua;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_pass $vm_upstream;
        }

        # Everything else — buffering off for Frappe streaming.
        location / {
            access_by_lua_file /etc/nginx/lua/router.lua;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_pass $vm_upstream;
        }
    }

    # --- Admin API: unix socket ONLY, never TCP. File perms are the gate. ---
    server {
        listen  unix:/run/nginx/admin.sock;
        access_log  /var/log/nginx/admin.log;

        location / {
            content_by_lua_file /etc/nginx/lua/admin.lua;
        }
    }
}

# --- L4 TCP forwarder (spec/17-tcp-proxy.md) ---
# The same nginx process also forwards raw TCP: a tenant with no public IPv4
# reaches the proxy's reserved IPv4 on a UNIQUE port, and the proxy forwards to
# the tenant VM's /128 on the real service port. The port->backend map is a
# stream{}-side lua_shared_dict (a SEPARATE address space from http{}'s `sites`),
# updated through a second unix-socket admin server with ZERO reload — the same
# reload-free property the HTTP side has. The one thing Lua cannot do is make
# nginx bind a new port, so we PRE-OPEN a fixed port range once (listen
# 10000-19999); allocating a port to a tenant is then a pure dict write.
stream {
    # The stream subsystem has no built-in access-log format (unlike http{}'s
    # `combined`), so declare one before referencing it or nginx -t fails with
    # "log format is not specified".
    log_format  stream_basic  '$remote_addr [$time_local] $protocol $status '
                              '$bytes_sent $bytes_received $session_time '
                              '"$server_port -> $upstream_addr"';
    access_log  /var/log/nginx/stream-access.log stream_basic;
    # notice level, mirroring http{} (CIS 3.3): L4 connect failures over the default
    # `error`, without `info`'s per-session volume.
    error_log   /var/log/nginx/error.log notice;

    # stream{} has its own lua_package_path context; point it at the same resty
    # libs + our stream_* modules.
    lua_package_path  "/usr/local/share/lua/5.1/?.lua;/etc/nginx/lua/?.lua;;";

    # cpath is per-subsystem too — http{}'s does NOT carry into stream{}. cjson.so
    # (build.sh §5b) installs to /usr/local/lib/lua/5.1; stream_admin.lua and
    # stream_persist.lua require("cjson.safe"), so name it explicitly here the same
    # way http{} does, or the first stream-admin call crashes loading cjson.
    lua_package_cpath "/usr/local/lib/lua/5.1/?.so;;";

    # The authoritative in-process port map: "<public_port>" -> "[<v6>]:<port>".
    # SEPARATE from http{}'s `sites` dict (cross-subsystem dict sharing is
    # unimplemented in OpenResty), so the TCP map has its own admin + persist.
    lua_shared_dict  ports  16m;

    # Cross-worker metadata (the last-dump epoch the STAT verb reports). Named
    # `stream_meta`, NOT `meta`: a lua_shared_dict ZONE NAME is global to nginx (the
    # shared-memory zone registry spans http{} and stream{}), so reusing http{}'s
    # `meta` name is a hard `nginx -t` error ("zone already declared for a different
    # use") — the per-subsystem isolation is of the dict's CONTENTS/address space,
    # not its name. Kept out of `ports` so it never pollutes get_keys/serialize.
    lua_shared_dict  stream_meta  12k;

    # Repopulate the dict from the on-disk snapshot (stream-map.json) at worker
    # init so a fresh worker comes up already forwarding. The file is read ONLY
    # here; Atlas's reconcile is the durable source of truth.
    init_worker_by_lua_block {
        require("stream_persist").load()
    }

    # The pre-opened pool. ONE server block fronts the whole range. v4 lands here
    # via the reserved-IP 1:1 NAT (proxy-design.md §2.2); v6 lands on the proxy
    # /128. preread_by_lua reads the local port, looks up the backend, and sets
    # $tcp_upstream; proxy_pass dials the literal (no resolver — it's an IP).
    server {
        listen      10000-19999;
        listen      [::]:10000-19999;

        # No reload to add a mapping: the backend comes from the `ports` dict.
        preread_by_lua_file  /etc/nginx/lua/stream_router.lua;
        set $tcp_upstream "";
        proxy_pass  $tcp_upstream;

        # L4 passthrough — the proxy is a dumb pipe. SSH/MariaDB carry their own
        # transport security end-to-end to the guest; we never terminate TLS here.
        proxy_timeout  1h;          # long-lived SSH / DB sessions
        proxy_connect_timeout  5s;
    }

    # --- TCP admin: unix socket ONLY, never TCP. File perms are the gate.
    # A minimal line protocol (GET / SYNC / DUMP), NOT HTTP — the stream content
    # phase reads raw bytes off the downstream socket. (mirrors http admin.lua) ---
    server {
        listen  unix:/run/nginx/stream-admin.sock;
        content_by_lua_file /etc/nginx/lua/stream_admin.lua;
    }
}
