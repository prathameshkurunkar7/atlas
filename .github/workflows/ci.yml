name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: main-atlas-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # The host-side scripts (scripts/) run under the Atlas venv (a uv-managed
  # CPython 3.14) on a bootstrapped host: every Python verb runs as `atlas <verb>`
  # under that venv, so the honest floor is 3.14 — nothing host-side runs on stock
  # Ubuntu python. scripts/install.sh (POSIX sh) creates that venv over SSH BEFORE
  # the bootstrap Task, so bootstrap-server runs as `atlas bootstrap-server` on the
  # venv like every other verb — there is no carve-out and no script that must stay
  # parseable on Ubuntu's stock 3.12. The 3.14 compileall over scripts/ is the floor
  # gate. No bench: the lib unit-tests run standalone by design.
  host-scripts:
    runs-on: ubuntu-latest
    name: Host scripts (py3.14 floor)
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - name: Parse on the floor (py3.14)
        run: uv run --python 3.14 --no-project python -m compileall -q scripts/
      - name: Lib + CLI unit tests (stdlib, no bench) with coverage
        working-directory: scripts/lib
        # coverage is pulled ephemerally by uv (--with); it is NOT a project
        # dependency — the host code itself stays pure stdlib. `coverage run -m
        # unittest` is a drop-in for `python -m unittest`. We emit both an XML
        # (machine-readable) and a self-contained HTML report to browse locally.
        run: |
          uv run --python 3.14 --no-project --with coverage \
            coverage run --source=atlas --omit="atlas/test_*.py" \
            -m unittest discover -s atlas -p "test_*.py"
          uv run --python 3.14 --no-project --with coverage coverage report
          uv run --python 3.14 --no-project --with coverage coverage xml -o coverage.xml
          uv run --python 3.14 --no-project --with coverage coverage html -d htmlcov

      - name: Upload host-scripts coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-host-scripts
          path: |
            scripts/lib/coverage.xml
            scripts/lib/htmlcov

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Find tests
        run: |
          echo "Finding tests"
          grep -rn "def test" > /dev/null

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT'

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install MariaDB Client
        run: |
          sudo apt update
          sudo apt-get install mariadb-client

      - name: Setup
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench

      - name: Install
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app atlas $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app atlas
          bench build
        env:
          CI: 'Yes'

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        # --coverage uses frappe.coverage.CodeCoverage (the `coverage` package is
        # already a frappe dependency — no extra dependency added). bench runs
        # its subcommands with cwd=<bench>/sites, and CodeCoverage uses relative
        # paths, so both coverage.xml and the (suffixed) .coverage data file land
        # in sites/, not the bench root. Render the browsable HTML report from
        # that same directory. `|| true` keeps a missing/empty report from
        # failing an otherwise-green test run (coverage html exits 1 on no data).
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app atlas --coverage
          ( cd sites && ../env/bin/coverage html -d htmlcov ) || true
        env:
          TYPE: server

      - name: Upload server coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: |
            /home/runner/frappe-bench/sites/coverage.xml
            /home/runner/frappe-bench/sites/htmlcov
